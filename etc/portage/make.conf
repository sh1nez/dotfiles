COMMON_FLAGS="-march=haswell -O2 -pipe"
CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"

MAKEOPTS="--jobs 8"
EMERGE_DEFAULT_OPTS="--load-average=6.5 --keep-going --autounmask=y --getbinpkg --binpkg-respect-use=y"

CC="clang"
CXX="clang++"
AR="llvm-ar"
NM="llvm-nm"
RANLIB="llvm-ranlib"


ACCEPT_LICENSE="*"
#ACCEPT_KEYWORDS="~amd64"


USE="-kde -gnome -bluetooth -wifi -ipv6 -flatpak " 
USE="${USE} vulkan gles2 dbus wayland pulseaudio pipewire tray clang boost gtk4 pgo lto"

CPU_FLAGS_X86="aes avx avx2 f16c fma3 mmx mmxext pclmul popcnt rdrand sse sse2 sse3 sse4_1 sse4_2 ssse3"

VIDEO_CARDS="nvidia"
LIBA_DRIVER_NAME="vdpau"

PYTHON_TARGETS="python3_11 python3_12"
PYTHON_SINGLE_TARGET="python3_11"


FEATURES="ccache" 
CCACHE_DIR="/var/cache/ccache"
CCACHE_SIZE="5GiB"


LANGUAS="en"
L10N="en-US"
LC_MESSAGES=C.utf8
GRUB_PLATFORMS="efi-64"


GENTOO_MIRRORS="http://mirror.mephi.ru/gentoo-distfiles/  rsync://mirror.mephi.ru"
# http://gentoo-mirror.alexxy.name/"


